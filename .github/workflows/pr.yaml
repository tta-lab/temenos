name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # zizmor: ignore[artipacked]

      - name: Setup Go
        uses: actions/setup-go@v5 # zizmor: ignore[artipacked]
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: make test

      - name: Build
        run: make build
