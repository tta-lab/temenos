name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # zizmor: ignore[artipacked]

      - name: Setup Go
        uses: actions/setup-go@v5 # zizmor: ignore[artipacked]
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@v9 # zizmor: ignore[unpinned-uses]
        with:
          version: v2.11.4

      - name: Test
        run: make test

      - name: Build
        run: make build
