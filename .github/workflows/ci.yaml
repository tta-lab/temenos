name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # zizmor: ignore[artipacked]

      - name: Setup Go
        uses: actions/setup-go@v5 # zizmor: ignore[artipacked]
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # zizmor: ignore[artipacked]

      - name: Setup Go
        uses: actions/setup-go@v5 # zizmor: ignore[artipacked]
        with:
          go-version-file: go.mod

      - name: Format check
        run: make fmt && git diff --exit-code --quiet -- '*.go'

      - name: Vet
        run: make vet

      - name: Lint
        uses: golangci/golangci-lint-action@v9 # zizmor: ignore[unpinned-uses]
        with:
          version: v2.10
          args: --timeout 5m
