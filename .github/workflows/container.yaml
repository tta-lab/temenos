name: Container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # zizmor: ignore[artipacked]

      - name: Download flicknote-cli
        run: |
          set -e
          ASSET="flicknote-cli-x86_64-unknown-linux-musl.tar.xz"
          BASE_URL="https://github.com/GuionAI/flicknote-cli/releases/latest/download"
          curl -fsSL "${BASE_URL}/${ASSET}" -o /tmp/flicknote.tar.xz
          EXPECTED=$(curl -fsSL "${BASE_URL}/${ASSET}.sha256" | awk '{print $1}')
          [ -n "$EXPECTED" ] || { echo "ERROR: sha256 empty" >&2; exit 1; }
          echo "${EXPECTED}  /tmp/flicknote.tar.xz" | sha256sum -c -
          tar -xJf /tmp/flicknote.tar.xz --strip-components=1 -C /tmp \
  --no-same-owner --no-same-permissions \
  "flicknote-cli-x86_64-unknown-linux-musl/flicknote"
          [ -f /tmp/flicknote ] || { echo "ERROR: flicknote binary not found" >&2; exit 1; }
          mv /tmp/flicknote ./flicknote
          chmod +x ./flicknote

      - name: Download task
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TASK_URL=$(curl -fsSL         -H "Authorization: Bearer ${GITHUB_TOKEN}"         "https://api.github.com/repos/GuionAI/taskwarrior/releases/latest"         | jq -r '.assets[] | select(.name | test("x86_64-linux")) | .browser_download_url')
          [ -n "$TASK_URL" ] && [ "$TASK_URL" \!= "null" ] || { echo "ERROR: no x86_64-linux asset" >&2; exit 1; }
          curl -fsSL "$TASK_URL" | tar -xzf - -C /tmp --no-same-owner --no-same-permissions
          [ -f /tmp/task ] || { echo "ERROR: task binary not found" >&2; exit 1; }
          mv /tmp/task ./task
          chmod +x ./task

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # zizmor: ignore[unpinned-uses]

      - name: Login to GHCR
        uses: docker/login-action@v3 # zizmor: ignore[unpinned-uses]
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5 # zizmor: ignore[unpinned-uses]
        with:
          images: ghcr.io/tta-lab/temenos
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6 # zizmor: ignore[unpinned-uses]
        if: github.event_name != 'pull_request'
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: PR build notice
        if: github.event_name == 'pull_request'
        run: echo "::notice::PR build: image built but not pushed to GHCR"
